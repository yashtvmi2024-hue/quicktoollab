<!DOCTYPE html>
<html>

<head>

<title>QuickToolLab</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#020617;
border-bottom:1px solid #1e293b;
}

nav h1{
margin:0;
color:#38bdf8;
font-size:22px;
}

nav a{
color:#cbd5f5;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
text-align:center;
padding:60px 20px;
}

.hero h2{
font-size:40px;
color:#38bdf8;
margin-bottom:10px;
}

.hero p{
color:#94a3b8;
}

/* TOOL GRID */

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
background:#334155;
}

.card h3{
color:#38bdf8;
margin-top:0;
}

.card input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

.card button{
width:100%;
margin-top:10px;
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:10px;
color:#22c55e;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
color:#94a3b8;
}

</style>

</head>


<body>


<nav>

<h1>QuickToolLab</h1>

<div>
<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">About</a>
</div>

</nav>


<section class="hero">

<h2>Free Online Tools</h2>

<p>Simple utilities for everyday problems</p>

</section>



<div class="container">

<div class="grid">


<!-- BMI TOOL -->

<div class="card">

<h3>BMI Calculator</h3>

<input id="w" placeholder="Weight kg">

<input id="h" placeholder="Height cm">

<button onclick="bmi()">Calculate</button>

<div id="bmi" class="result"></div>

</div>



<!-- RANDOM NUMBER -->

<div class="card">

<h3>Random Number Generator</h3>

<button onclick="rand()">Generate</button>

<div id="rand" class="result"></div>

</div>



<!-- PASSWORD -->

<div class="card">

<h3>Password Generator</h3>

<button onclick="pass()">Generate</button>

<div id="pass" class="result"></div>

</div>


</div>

</div>


<footer>

<p>© 2026 QuickToolLab</p>

</footer>



<script>

function bmi(){

let w=document.getElementById("w").value

let h=document.getElementById("h").value/100

let r=w/(h*h)

document.getElementById("bmi").innerText="BMI: "+r.toFixed(2)

}


function rand(){

document.getElementById("rand").innerText=Math.floor(Math.random()*100)

}


function pass(){

let chars="abcdefghijklmnopqrstuvwxyz0123456789"

let p=""

for(let i=0;i<10;i++){

p+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("pass").innerText=p

}

</script>


</body>
</html>
