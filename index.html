<!DOCTYPE html>
<html>
<head>
<title>QuickToolLab - Free Online Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
text-align:center;
}

header{
background:#2563eb;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.tool{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

input{
padding:8px;
margin:5px;
}
</style>
</head>

<body>

<header>QuickToolLab</header>

<div class="container">

<div class="tool">
<h2>BMI Calculator</h2>
<input id="weight" placeholder="Weight (kg)">
<input id="height" placeholder="Height (cm)">
<br><br>
<button onclick="bmi()">Calculate BMI</button>
<p id="bmiResult"></p>
</div>

<div class="tool">
<h2>Water Intake Calculator</h2>
<input id="waterWeight" placeholder="Weight (kg)">
<br><br>
<button onclick="water()">Calculate Water Intake</button>
<p id="waterResult"></p>
</div>

<div class="tool">
<h2>YouTube Title Generator</h2>
<input id="topic" placeholder="Video Topic">
<br><br>
<button onclick="yt()">Generate Title</button>
<p id="ytResult"></p>
</div>

</div>

<script>

function bmi(){
let w=document.getElementById("weight").value;
let h=document.getElementById("height").value/100;

let result=w/(h*h);

document.getElementById("bmiResult").innerHTML=
"BMI: "+result.toFixed(2);
}

function water(){
let w=document.getElementById("waterWeight").value;

let intake=(w*0.033).toFixed(2);

document.getElementById("waterResult").innerHTML=
"Drink about "+intake+" liters daily";
}

function yt(){

let topic=document.getElementById("topic").value;

let titles=[
"10 Things You Didn't Know About "+topic,
"The Truth About "+topic,
"Beginner Guide to "+topic,
"I Tried "+topic+" For 7 Days",
"Why Everyone Is Talking About "+topic
];

let random=titles[Math.floor(Math.random()*titles.length)];

document.getElementById("ytResult").innerHTML=random;

}

</script>

</body>
</html>
