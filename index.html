<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickToolLab</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>QuickToolLab</h1>
<p>Free Online Tools</p>

<input type="text" id="search" placeholder="Search tools..." onkeyup="searchTools()">

</header>


<div class="container" id="toolContainer">


<div class="tool">
<h3>BMI Calculator</h3>

<input id="weight" placeholder="Weight (kg)">
<input id="height" placeholder="Height (cm)">

<button onclick="bmi()">Calculate</button>

<div id="bmiResult" class="result"></div>

</div>


<div class="tool">

<h3>Age Calculator</h3>

<input type="date" id="dob">

<button onclick="ageCalc()">Calculate</button>

<div id="ageResult" class="result"></div>

</div>


<div class="tool">

<h3>Percentage Calculator</h3>

<input id="total" placeholder="Total Marks">

<input id="obtained" placeholder="Obtained Marks">

<button onclick="percentage()">Calculate</button>

<div id="percentResult" class="result"></div>

</div>


<div class="tool">

<h3>Password Generator</h3>

<button onclick="generatePassword()">Generate Password</button>

<div id="passwordResult" class="result"></div>

</div>


</div>

<footer>

<p>© 2026 QuickToolLab</p>

</footer>

<script src="script.js"></script>

</body>
</html>
