<!DOCTYPE html>
<html>
<head>
<title>QuickToolLab</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#f2f5f9;
}

header{
background:#2563eb;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.tool{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

input{
padding:8px;
margin:5px;
}

.result{
margin-top:10px;
font-weight:bold;
color:#2563eb;
}
</style>
</head>

<body>

<header>QuickToolLab</header>

<div class="container">

<div class="tool">
<h2>BMI Calculator</h2>

<input id="weight" placeholder="Weight kg">
<input id="height" placeholder="Height cm">

<br><br>

<button onclick="bmi()">Calculate</button>

<div id="bmiResult" class="result"></div>
</div>


<div class="tool">
<h2>Water Intake Calculator</h2>

<input id="waterWeight" placeholder="Weight kg">

<br><br>

<button onclick="water()">Calculate</button>

<div id="waterResult" class="result"></div>

</div>

</div>

<script>

function bmi(){

let w=document.getElementById("weight").value;
let h=document.getElementById("height").value/100;

let result=w/(h*h);

document.getElementById("bmiResult").innerHTML="BMI: "+result.toFixed(2);

}

function water(){

let w=document.getElementById("waterWeight").value;

let intake=(w*0.033).toFixed(2);

document.getElementById("waterResult").innerHTML="Drink about "+intake+" liters daily";

}

</script>

</body>
</html>
