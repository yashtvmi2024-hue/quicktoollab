<!DOCTYPE html>
<html>
<head>
<title>Minutes to Hours</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<nav><h1>QuickToolLab</h1></nav>

<div class="container">

<h2>Minutes to Hours</h2>

<input id="m">

<button onclick="convert()">Convert</button>

<div id="result" class="result"></div>

</div>

<script>

function convert(){

let m=document.getElementById("m").value

document.getElementById("result").innerText=(m/60)+" hours"

}

</script>

</body>
</html>
