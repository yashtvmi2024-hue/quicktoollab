<!DOCTYPE html>
<html>
<head>
<title>Age Calculator | QuickToolLab</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<nav>
<h1>QuickToolLab</h1>
</nav>

<div class="container">

<h2>Age Calculator</h2>

<input type="date" id="birthdate">

<button onclick="age()">Calculate Age</button>

<div id="result" class="result"></div>

</div>

<script>

function age(){

let birth=new Date(document.getElementById("birthdate").value)

let today=new Date()

let age=today.getFullYear()-birth.getFullYear()

document.getElementById("result").innerText=age+" years"

}

</script>

</body>
</html>
