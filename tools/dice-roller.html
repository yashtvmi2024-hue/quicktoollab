<!DOCTYPE html>
<html>
<head>
<title>Dice Roller</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<nav><h1>QuickToolLab</h1></nav>

<div class="container">

<h2>Dice Roller</h2>

<button onclick="roll()">Roll Dice</button>

<div id="result" class="result"></div>

</div>

<script>

function roll(){

document.getElementById("result").innerText=Math.floor(Math.random()*6)+1

}

</script>

</body>
</html>
